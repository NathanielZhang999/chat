<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Global Chat</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root { --primary: #0ea5e9; --bg: #0f172a; --surface: #1e293b; --text: #f8fafc; --text-muted: #94a3b8; --border: #334155; --error: #ef4444;}
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; align-items: center; justify-content: center; }
        
        #app { width: 100%; max-width: 900px; height: 100vh; background: var(--surface); display: flex; position: relative; }
        @media (min-width: 768px) { #app { height: 90vh; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--border); } }

        /* Auth Modal */
        #auth-modal { position: absolute; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; backdrop-filter: blur(4px); }
        .auth-container { width: 100%; max-width: 340px; background: var(--surface); padding: 2rem; border-radius: 12px; border: 1px solid var(--border); }
        .auth-container h1 { font-size: 1.8rem; text-align: center; margin-bottom: 1.5rem; color: var(--primary); }
        
        .auth-tabs { display: flex; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
        .tab { flex: 1; text-align: center; padding: 0.5rem; cursor: pointer; color: var(--text-muted); font-weight: 500; transition: 0.2s; }
        .tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); margin-bottom: -1px; }

        .input-group { margin-bottom: 1rem; }
        .input-group label { display: block; font-size: 0.85rem; margin-bottom: 0.4rem; color: var(--text-muted); }
        input.text-input { width: 100%; padding: 0.8rem; background: #0f172a; color: white; border: 1px solid var(--border); border-radius: 6px; outline: none; font-size: 1rem; }
        input.text-input:focus { border-color: var(--primary); }
        
        button.btn-primary { width: 100%; padding: 0.8rem; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; background: var(--primary); color: white; margin-top: 0.5rem; }
        button.btn-primary:hover:not(:disabled) { background: #0284c7; }
        button.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        
        #auth-error { color: var(--error); font-size: 0.85rem; text-align: center; margin-top: 1rem; min-height: 20px; font-weight: 500; }

        /* Main Layout */
        #sidebar { width: 220px; background: #0f172a; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        @media (max-width: 640px) { #sidebar { display: none; } }
        .sidebar-header { padding: 1.2rem 1rem; border-bottom: 1px solid var(--border); font-weight: 600; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; }
        #online-list { list-style: none; padding: 1rem; flex: 1; overflow-y: auto; }
        #online-list li { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; margin-bottom: 0.8rem; color: var(--text); }
        #online-list li::before { content: ''; display: block; width: 8px; height: 8px; border-radius: 50%; background: #10b981; }

        #chat-area { flex: 1; display: flex; flex-direction: column; background: var(--surface); position: relative; }
        header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: #0f172a; }
        header h2 { font-size: 1.1rem; }
        #status { font-size: 0.75rem; padding: 0.3rem 0.6rem; border-radius: 12px; background: var(--border); }

        /* Messages */
        #chat-window { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
        .msg { max-width: 80%; display: flex; flex-direction: column; animation: fadeIn 0.2s ease-out; }
        .msg.me { align-self: flex-end; align-items: flex-end; }
        .msg.other { align-self: flex-start; align-items: flex-start; }
        
        .msg-author { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.25rem; margin-left: 0.25rem; font-weight: 500; }
        .msg-bubble { padding: 0.75rem 1rem; border-radius: 1rem; font-size: 0.95rem; line-height: 1.4; word-break: break-word; }
        .msg.me .msg-bubble { background: var(--primary); color: white; border-bottom-right-radius: 0.25rem; }
        .msg.other .msg-bubble { background: #334155; color: white; border-bottom-left-radius: 0.25rem; }
        .msg-time { font-size: 0.65rem; color: var(--text-muted); margin-top: 0.25rem; }
        .system-msg { text-align: center; font-size: 0.8rem; color: var(--text-muted); margin: 0.5rem 0; font-style: italic; }

        /* Compose */
        #typing-indicator { padding: 0 1.5rem; font-size: 0.8rem; color: var(--text-muted); height: 25px; font-style: italic; display: flex; align-items: center; }
        form#compose { display: flex; padding: 1rem; background: #0f172a; border-top: 1px solid var(--border); gap: 0.5rem; }
        form#compose input { flex: 1; border-radius: 20px; }
        form#compose button { width: auto; padding: 0.75rem 1.5rem; border-radius: 20px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="app">
    <div id="auth-modal">
        <div class="auth-container">
            <h1>Pro Chat</h1>
            <div class="auth-tabs">
                <div class="tab active" id="tab-login">Login</div>
                <div class="tab" id="tab-register">Register</div>
            </div>
            <div class="input-group">
                <label>Render Backend URL</label>
                <input type="text" id="url-input" class="text-input" placeholder="https://your-app.onrender.com" autocomplete="off">
            </div>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username-input" class="text-input" placeholder="Username" maxlength="20">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password-input" class="text-input" placeholder="••••••••">
            </div>
            <button id="auth-btn" class="btn-primary">Login</button>
            <div id="auth-error"></div>
        </div>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">Online (<span id="online-count">0</span>)</div>
        <ul id="online-list"></ul>
    </div>

    <div id="chat-area">
        <header>
            <h2>Global Chat</h2>
            <span id="status">Disconnected</span>
        </header>
        
        <div id="chat-window"></div>
        <div id="typing-indicator"></div>
        
        <form id="compose">
            <input type="text" id="msg-input" class="text-input" placeholder="Type a message..." autocomplete="off">
            <button type="submit" class="btn-primary">Send</button>
        </form>
    </div>
</div>

<script>
    let socket;
    let myUsername = "";
    let isLoginMode = true;
    let typingTimeout;
    const typingUsers = new Set();

    // DOM Elements
    const authModal = document.getElementById('auth-modal');
    const tabLogin = document.getElementById('tab-login');
    const tabRegister = document.getElementById('tab-register');
    const authBtn = document.getElementById('auth-btn');
    const authError = document.getElementById('auth-error');
    
    const urlInput = document.getElementById('url-input');
    const usernameInput = document.getElementById('username-input');
    const passwordInput = document.getElementById('password-input');
    
    const chatWindow = document.getElementById('chat-window');
    const typingIndicator = document.getElementById('typing-indicator');
    const onlineList = document.getElementById('online-list');
    const onlineCount = document.getElementById('online-count');
    const statusEl = document.getElementById('status');
    const msgInput = document.getElementById('msg-input');

    // Auto-fill memory
    if (localStorage.getItem('pro_chat_url')) urlInput.value = localStorage.getItem('pro_chat_url');
    if (localStorage.getItem('pro_chat_user')) usernameInput.value = localStorage.getItem('pro_chat_user');

    // Tab Logic
    tabLogin.onclick = () => { isLoginMode = true; tabLogin.classList.add('active'); tabRegister.classList.remove('active'); authBtn.textContent = 'Login'; authError.textContent = ''; };
    tabRegister.onclick = () => { isLoginMode = false; tabRegister.classList.add('active'); tabLogin.classList.remove('active'); authBtn.textContent = 'Register'; authError.textContent = ''; };

    function connectAndAuthenticate() {
        let url = urlInput.value.trim();
        const username = usernameInput.value.trim();
        const password = passwordInput.value;

        if (!url || !username || !password) return showError('All fields are required.', false);
        if (!url.startsWith('http')) url = 'https://' + url;
        url = url.replace(/\/$/, ''); 
        
        localStorage.setItem('pro_chat_url', url);
        localStorage.setItem('pro_chat_user', username);
        
        authError.style.color = "var(--text)";
        authError.textContent = "Connecting to server...";
        authBtn.disabled = true;

        if (!socket) {
            socket = io(url, { reconnectionAttempts: Infinity });
            setupSocketListeners();
        }

        const action = isLoginMode ? 'login' : 'register';

        // Wait for connect event, then ask server to verify password
        const emitAuth = () => {
            authError.textContent = `Attempting to ${action}...`;
            socket.emit(action, { username, password }, (response) => {
                authBtn.disabled = false;
                if (response.error) {
                    showError(response.error, false);
                } else if (action === 'register') {
                    showError("Registered! You can now log in.", true);
                    passwordInput.value = "";
                    setTimeout(() => tabLogin.click(), 1500);
                } else if (action === 'login') {
                    myUsername = response.username;
                    authModal.style.display = 'none';
                    statusEl.textContent = '🟢 Online';
                    statusEl.style.color = '#10b981';
                    
                    // Load message history
                    chatWindow.innerHTML = '';
                    if(response.history) {
                        response.history.forEach(msg => appendMessage(msg, msg.username === myUsername));
                        if(response.history.length > 0) appendSystemMessage("--- End of History ---");
                    }
                }
            });
        };

        if (socket.connected) emitAuth();
        else socket.once('connect', emitAuth);
    }

    function setupSocketListeners() {
        socket.on('connect_error', () => {
            authError.textContent = 'Waking server up... (~50s on free tier)';
            authBtn.disabled = false;
        });

        socket.on('disconnect', () => {
            statusEl.textContent = '🔴 Offline';
            statusEl.style.color = 'var(--text)';
            appendSystemMessage("Connection lost. Reconnecting...");
        });
        
        socket.on('chat_message', (data) => {
            appendMessage(data, data.username === myUsername);
            typingUsers.delete(data.username);
            updateTypingUI();
        });
        
        socket.on('system_message', (text) => appendSystemMessage(text));

        // Update Online Users Sidebar
        socket.on('online_users', (users) => {
            onlineCount.textContent = users.length;
            onlineList.innerHTML = '';
            users.forEach(u => {
                const li = document.createElement('li');
                li.textContent = u + (u === myUsername ? " (You)" : "");
                onlineList.appendChild(li);
            });
        });

        // Typing event handler
        socket.on('typing', (data) => {
            if (data.isTyping) typingUsers.add(data.username);
            else typingUsers.delete(data.username);
            updateTypingUI();
        });
    }

    authBtn.addEventListener('click', connectAndAuthenticate);

    // Handle sending message
    document.getElementById('compose').addEventListener('submit', (e) => {
        e.preventDefault();
        const text = msgInput.value.trim();
        if (text && socket?.connected) {
            socket.emit('chat_message', text);
            msgInput.value = '';
            socket.emit('typing', false); // Stop typing immediately
        }
    });

    // Detect user keystrokes for typing indicator
    msgInput.addEventListener('input', () => {
        if (!socket?.connected) return;
        socket.emit('typing', true);
        
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            socket.emit('typing', false);
        }, 1500); // Stop typing indicator if no keystrokes for 1.5s
    });

    // UI Helpers
    function showError(msg, isSuccess) {
        authError.style.color = isSuccess ? "#10b981" : "var(--error)";
        authError.textContent = msg;
    }

    function appendMessage(data, isMe) {
        const wrapper = document.createElement('div');
        wrapper.className = `msg ${isMe ? 'me' : 'other'}`;

        if (!isMe) {
            const author = document.createElement('div');
            author.className = 'msg-author';
            author.textContent = data.username;
            wrapper.appendChild(author);
        }

        const bubble = document.createElement('div');
        bubble.className = 'msg-bubble';
        bubble.textContent = data.text; // Bug Prevention: TextContent natively blocks XSS attacks

        const time = document.createElement('div');
        time.className = 'msg-time';
        time.textContent = new Date(data.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

        wrapper.appendChild(bubble);
        wrapper.appendChild(time);
        chatWindow.appendChild(wrapper);
        chatWindow.scrollTop = chatWindow.scrollHeight; // Auto-scroll
    }

    function appendSystemMessage(text) {
        const el = document.createElement('div');
        el.className = 'system-msg';
        el.textContent = text;
        chatWindow.appendChild(el);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function updateTypingUI() {
        if (typingUsers.size === 0) typingIndicator.textContent = '';
        else if (typingUsers.size === 1) typingIndicator.textContent = `${Array.from(typingUsers)[0]} is typing...`;
        else typingIndicator.textContent = 'Multiple people are typing...';
    }
</script>
</body>
</html>
