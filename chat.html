<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Global Chat</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        :root { --primary: #5865F2; --bg: #202225; --surface: #36393f; --surface-dark: #2f3136; --text: #dcddde; --text-muted: #8e9297; --border: #202225; --error: #ed4245; --warning: #faa61a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        #app { width: 100%; height: 100vh; background: var(--surface); display: flex; position: relative; }

        /* Modals */
        .modal { position: absolute; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; backdrop-filter: blur(2px); animation: fadeModal 0.15s ease-out; }
        .modal.active { display: flex; }
        .modal-box { width: 100%; max-width: 400px; background: var(--surface); padding: 2rem; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); position: relative; animation: popModal 0.15s ease-out; }
        .modal-box h2 { color: white; margin-bottom: 1.5rem; text-align: center; font-size: 1.4rem; }
        .close-btn { position: absolute; top: 15px; right: 20px; cursor: pointer; color: var(--text-muted); font-size: 1.5rem; background: none; border: none; }
        .close-btn:hover { color: white; }

        .auth-tabs { display: flex; margin-bottom: 1.5rem; border-bottom: 2px solid var(--surface-dark); }
        .tab { flex: 1; text-align: center; padding: 0.5rem; cursor: pointer; color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 0.8rem; transition: 0.2s; }
        .tab.active { color: white; border-bottom: 2px solid var(--primary); margin-bottom: -2px; }

        .input-group { margin-bottom: 1rem; }
        .input-group label { display: block; font-size: 0.75rem; margin-bottom: 0.4rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; }
        input.text-input { width: 100%; padding: 0.8rem; background: #202225; color: white; border: 1px solid var(--border); border-radius: 4px; outline: none; font-size: 1rem; transition: border-color 0.2s;}
        input.text-input:focus { border-color: var(--primary); }
        
        button.btn-primary { width: 100%; padding: 0.8rem; border: none; border-radius: 4px; font-weight: 600; font-size: 1rem; cursor: pointer; background: var(--primary); color: white; transition: 0.2s; }
        button.btn-primary:hover:not(:disabled) { background: #4752c4; }
        button.btn-secondary { background: #4f545c; }
        button.btn-secondary:hover:not(:disabled) { background: #686d73; }
        #auth-error { color: var(--error); font-size: 0.85rem; text-align: center; margin-top: 1rem; min-height: 20px; font-weight: 500; }

        /* Servers Sidebar */
        #servers-sidebar { width: 72px; background: #202225; display: flex; flex-direction: column; align-items: center; padding: 12px 0; gap: 8px; overflow-y: auto; overflow-x: hidden; flex-shrink: 0; scrollbar-width: none; }
        #servers-sidebar::-webkit-scrollbar { display: none; }
        .server-icon { width: 48px; height: 48px; border-radius: 50%; background: #36393f; color: white; display: flex; justify-content: center; align-items: center; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 1.2rem; position: relative; flex-shrink: 0; }
        .server-icon:hover, .server-icon.active { border-radius: 16px; background: var(--primary); opacity: 1 !important; }
        .server-icon.add-btn { background: #36393f; color: #3ba55c; font-weight: 300; font-size: 1.5rem; }
        .server-icon.add-btn:hover { background: #3ba55c; color: white; }
        .tooltip { position: absolute; left: 60px; background: black; color: white; padding: 6px 10px; border-radius: 4px; font-size: 0.8rem; white-space: nowrap; pointer-events: none; opacity: 0; transform: scale(0.9); transition: 0.1s; transform-origin: left; z-index: 100; font-weight: 600; }
        .server-icon:hover .tooltip { opacity: 1; transform: scale(1); }

        /* Chat Area */
        #chat-area { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
        header { padding: 0 1rem; height: 50px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--surface); z-index: 10; }
        #server-title { font-weight: 600; font-size: 1rem; color: white; display: flex; align-items: center; gap: 8px; }
        .admin-badge { background: var(--error); color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 4px; font-weight: bold; text-transform: uppercase; margin-left: 5px; }
        
        .header-actions { display: flex; gap: 8px; align-items: center; }
        .header-btn { font-size: 0.8rem; padding: 6px 12px; border-radius: 4px; color: white; cursor: pointer; transition: 0.2s; font-weight: 600; border: none; display: none; }
        .header-btn.primary { background: var(--primary); }
        .header-btn.delete, .header-btn.logout { background: var(--error); }
        .header-btn.success { background: #3ba55c; }
        .header-btn.danger { background: #4f545c; }
        .header-btn.logout { display: block; }

        #chat-window { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; background: var(--surface); }
        
        .msg { display: flex; gap: 14px; animation: fadeIn 0.2s ease-out; position: relative; padding: 0.4rem 1rem; border-left: 2px solid transparent; }
        .msg:hover { background: rgba(4, 4, 5, 0.07); }
        .msg.pinged { background: rgba(250, 166, 26, 0.1) !important; border-left: 2px solid var(--warning) !important; }
        
        .msg-avatar { width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.2rem; color: white; }
        .msg-body { display: flex; flex-direction: column; flex: 1; min-width: 0; }

        /* Replies Context */
        .reply-context { font-size: 0.8rem; color: var(--text-muted); display: flex; align-items: center; gap: 5px; margin-bottom: 4px; cursor: pointer; user-select: none; }
        .reply-context:hover { color: var(--text); }
        .reply-context::before { content: '↳'; margin-right: 2px; font-weight: bold; font-size: 1rem;}
        .reply-author { font-weight: 600; color: white; }
        .reply-text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60%; opacity: 0.8; }
        .reply-context img { display: none; } /* Hide heavy embeds in tiny replies */

        .msg-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 0.25rem; }
        .msg-author { font-size: 1rem; color: white; font-weight: 600; }
        .msg-time-header { font-size: 0.75rem; color: var(--text-muted); }

        .msg-actions { position: absolute; right: 1rem; top: -10px; display: none; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; box-shadow: 0 0 5px rgba(0,0,0,0.2); z-index: 5;}
        .msg:hover .msg-actions { display: flex; }
        .action-btn { background: none; border: none; padding: 6px 12px; color: var(--text-muted); font-size: 0.8rem; cursor: pointer; transition: 0.1s; }
        .action-btn:hover { background: var(--surface-dark); color: white; }
        .action-btn.del:hover { color: var(--error); }

        /* Rich Text & Formatting */
        .msg-text { font-size: 0.95rem; line-height: 1.4; word-break: break-word; color: var(--text); display: inline-block;}
        .msg-text strong { font-weight: 700; color: white; }
        .msg-text em { font-style: italic; }
        .msg-text u { text-decoration: underline; }
        .msg-text del { text-decoration: line-through; opacity: 0.7; }
        .msg-text code { background: #202225; padding: 2px 5px; border-radius: 3px; font-family: monospace; font-size: 0.9em; border: 1px solid #1a1c1e; }
        .chat-img { display: block; max-width: 100%; max-height: 250px; border-radius: 8px; margin-top: 8px; cursor: pointer; border: 1px solid var(--surface-dark); }
        .chat-link { color: #00b0f4; text-decoration: none; }
        .chat-link:hover { text-decoration: underline; }

        .ping-tag { background: rgba(88, 101, 242, 0.4); color: #eef; padding: 0 4px; border-radius: 3px; font-weight: 600; }
        .ping-tag.everyone { background: rgba(250, 166, 26, 0.4); color: #fff; }
        .ping-tag.other { background: transparent; color: var(--primary); padding: 0; }

        .edited-tag { font-size: 0.7rem; color: var(--text-muted); margin-left: 5px; cursor: pointer; user-select: none; }
        .edited-tag:hover { text-decoration: underline; }
        
        /* Soft Delete */
        .msg.is-deleted .deleted-text { font-style: italic; color: var(--text-muted); }
        .view-deleted-tag { cursor: pointer; text-decoration: underline; margin-left: 5px; color: var(--error); }

        .system-msg { text-align: center; font-size: 0.85rem; color: var(--text-muted); margin: 1rem 0; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .system-msg::before, .system-msg::after { content: ""; flex: 1; border-bottom: 1px solid var(--surface-dark); max-width: 50px; }

        #typing-indicator { padding: 0 1rem; font-size: 0.85rem; color: white; height: 20px; font-weight: 600; display: flex; align-items: center; position: absolute; bottom: 85px; left: 0; }
        
        /* Unified Info Bar */
        .info-bar { display: none; background: var(--surface-dark); padding: 8px 16px; border-radius: 8px 8px 0 0; margin: 0 16px; font-size: 0.85rem; color: var(--text); align-items: center; justify-content: space-between; border-top: 1px solid var(--primary); }
        .info-bar button { background: none; border: none; color: var(--primary); cursor: pointer; font-weight: 500; font-size: 0.85rem;}
        
        form#compose { display: flex; padding: 0 16px 24px 16px; background: var(--surface); gap: 0.5rem; align-items: center; position: relative; z-index: 10; }
        .input-wrapper { flex: 1; background: #40444b; border-radius: 8px; display: flex; align-items: center; padding-right: 8px; }
        form#compose input { flex: 1; background: transparent; border: none; padding: 12px 16px; color: var(--text); outline: none; font-size: 1rem; }
        form#compose button.submit-btn { width: auto; padding: 8px 16px; border-radius: 4px; font-weight: 600; font-size: 0.9rem; }

        #online-sidebar { width: 240px; background: #2f3136; display: flex; flex-direction: column; flex-shrink: 0; }
        @media (max-width: 800px) { #online-sidebar { display: none; } }
        .sidebar-header { padding: 1.2rem 1rem 0.5rem 1rem; font-weight: 600; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
        #online-list { list-style: none; padding: 0.5rem; flex: 1; overflow-y: auto; }
        .user-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 4px; color: var(--text-muted); font-weight: 500; cursor: pointer; }
        .user-item:hover { background: #393c43; color: var(--text); }
        .avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary); display: flex; justify-content: center; align-items: center; color: white; font-weight: bold; position: relative; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .status-dot { position: absolute; bottom: -2px; right: -2px; width: 12px; height: 12px; border-radius: 50%; background: #3ba55c; border: 2px solid #2f3136; }
        .stealth-admin { color: var(--warning) !important; font-style: italic; }

        #history-list { max-height: 350px; overflow-y: auto; margin-top: 1rem; text-align: left; }
        .hist-item { background: var(--surface-dark); padding: 1rem; border-radius: 4px; margin-bottom: 0.5rem; border-left: 3px solid var(--primary); }
        .hist-time { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.5rem; font-weight: 600;}
        .hist-text { font-size: 0.95rem; white-space: pre-wrap; word-break: break-word; color: var(--text); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeModal { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popModal { from { transform: scale(0.95); } to { transform: scale(1); } }
    </style>
</head>
<body>

<div id="app">
    <div id="custom-dialog-modal" class="modal" style="z-index: 2000;">
        <div class="modal-box" style="max-width: 380px; text-align: center;">
            <h2 id="cm-title" style="margin-bottom: 1rem; font-size: 1.3rem;">Notification</h2>
            <p id="cm-message" style="margin-bottom: 1.5rem; color: var(--text-muted); font-size: 0.95rem; line-height: 1.5; white-space: pre-wrap;"></p>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button id="cm-cancel-btn" class="btn-primary btn-secondary" style="flex: 1; display: none;">Cancel</button>
                <button id="cm-confirm-btn" class="btn-primary" style="flex: 1;">OK</button>
            </div>
        </div>
    </div>

    <div id="auth-modal" class="modal active">
        <div class="modal-box">
            <h2>Welcome Back!</h2>
            <div class="auth-tabs">
                <div class="tab active" id="tab-login">Login</div>
                <div class="tab" id="tab-register">Register</div>
            </div>
            <div class="input-group">
                <label>Backend URL</label>
                <input type="text" id="url-input" class="text-input" placeholder="https://your-app.onrender.com">
            </div>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username-input" class="text-input" maxlength="20">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password-input" class="text-input">
            </div>
            <button id="auth-btn" class="btn-primary">Login</button>
            <div id="auth-error"></div>
        </div>
    </div>

    <div id="server-modal" class="modal">
        <div class="modal-box">
            <button class="close-btn" onclick="document.getElementById('server-modal').classList.remove('active')">&times;</button>
            <h2 id="sm-title">Join a Server</h2>
            
            <div id="sm-join-ui">
                <div class="input-group">
                    <label>Invite Code</label>
                    <input type="text" id="join-code" class="text-input" placeholder="e.g. 8A2B9C" maxlength="6" style="text-transform: uppercase;">
                </div>
                <button id="submit-join-btn" class="btn-primary">Join Server</button>
                <div style="text-align:center; margin: 15px 0; color: var(--text-muted); font-size: 0.8rem;">— OR —</div>
                <button class="btn-primary btn-secondary" onclick="toggleServerModal('create')">Create My Own Server</button>
            </div>

            <div id="sm-create-ui" style="display:none;">
                <div class="input-group">
                    <label>Server Name</label>
                    <input type="text" id="create-name" class="text-input" placeholder="My Awesome Room" maxlength="30">
                </div>
                <button id="submit-create-btn" class="btn-primary">Create Server</button>
                <div style="text-align:center; margin: 15px 0; color: var(--text-muted); font-size: 0.8rem;">— OR —</div>
                <button class="btn-primary btn-secondary" onclick="toggleServerModal('join')">Join a Server</button>
            </div>
        </div>
    </div>

    <div id="history-modal" class="modal">
        <div class="modal-box" style="max-width: 500px;">
            <button class="close-btn" onclick="document.getElementById('history-modal').classList.remove('active')">&times;</button>
            <h2 id="history-modal-title">Message Edit History</h2>
            <div id="history-list"></div>
        </div>
    </div>

    <div id="servers-sidebar">
        <div class="server-icon active" id="srv-global" onclick="switchServer('global', 'Global Chat')">G<div class="tooltip">Global Chat</div></div>
        <div id="dynamic-servers" style="width: 100%; display: flex; flex-direction: column; align-items: center; gap: 8px;"></div>
        <div style="width: 32px; height: 2px; background: #2f3136; border-radius: 1px; margin: 4px 0; flex-shrink: 0;"></div>
        <div class="server-icon add-btn" onclick="openServerModal()">+<div class="tooltip">Add a Server</div></div>
    </div>

    <div id="chat-area">
        <header>
            <div id="server-title">Loading...</div>
            <div class="header-actions">
                <button class="header-btn primary" id="invite-code-btn" onclick="copyCode()" style="display: none;">Copy Code</button>
                <button class="header-btn danger" id="leave-server-btn" onclick="leaveServer()" style="display: none;">Leave</button>
                <button class="header-btn delete" id="delete-server-btn" onclick="deleteServer()" style="display: none;">Delete</button>
                <button class="header-btn success" id="join-server-btn" onclick="joinFromSnoop()" style="display: none;">Join (Visible)</button>
                <button class="header-btn logout" onclick="logoutApp()">Log Out</button>
            </div>
        </header>
        
        <div id="chat-window"></div>
        <div id="typing-indicator"></div>
        
        <div style="position: relative;">
            <div id="info-bar" class="info-bar">
                <span id="info-bar-text">Editing</span>
                <button type="button" onclick="cancelAction()">&times; Cancel</button>
            </div>
            <form id="compose">
                <div class="input-wrapper">
                    <input type="text" id="msg-input" placeholder="Message... (Markdown allowed: **bold** *italic* `code`)" autocomplete="off" disabled>
                    <button type="submit" id="send-btn" class="btn-primary submit-btn" disabled>Send</button>
                </div>
            </form>
        </div>
    </div>

    <div id="online-sidebar">
        <div class="sidebar-header" id="online-header">Room Online — <span id="online-count">0</span></div>
        <ul id="online-list"></ul>
    </div>
</div>

<script>
    // --- SYNTHESIZER AUDIO ENGINE ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(type) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;

        if (type === 'ping') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(500, now); osc.frequency.exponentialRampToValueAtTime(1000, now + 0.1);
            gain.gain.setValueAtTime(0.5, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        } else if (type === 'msg') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(400, now);
            gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now); osc.stop(now + 0.1);
        }
    }

    // --- DIALOG ENGINE ---
    function customDialog(title, message, isConfirm, confirmText = "OK", danger = false) {
        return new Promise((resolve) => {
            const modal = document.getElementById('custom-dialog-modal');
            document.getElementById('cm-title').textContent = title;
            document.getElementById('cm-message').textContent = message;
            
            const cancelBtn = document.getElementById('cm-cancel-btn');
            const confirmBtn = document.getElementById('cm-confirm-btn');
            confirmBtn.textContent = confirmText;
            confirmBtn.style.background = danger ? 'var(--error)' : 'var(--primary)';
            cancelBtn.style.display = isConfirm ? 'block' : 'none';
            modal.classList.add('active');

            const cleanup = () => { modal.classList.remove('active'); confirmBtn.onclick = null; cancelBtn.onclick = null; };
            confirmBtn.onclick = () => { cleanup(); resolve(true); };
            cancelBtn.onclick = () => { cleanup(); resolve(false); };
        });
    }
    const showAppAlert = (t, m) => customDialog(t, m, false);
    const showAppConfirm = (t, m, ct, d = false) => customDialog(t, m, true, ct, d);

    // --- AVATAR COLOR ENGINE ---
    function getUserColor(name) {
        if(name.toLowerCase() === 'nyzhang1' || name === 'System') return '#ed4245'; 
        let hash = 0; for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
        return `hsl(${Math.abs(hash % 360)}, 70%, 55%)`;
    }

    // --- MAIN LOGIC ---
    let socket;
    let myUsername = "";
    let myRole = "user"; 
    let currentServerCode = null; 
    let myJoinedServers = []; 
    let serversCache = { 'global': { name: 'Global Chat', owner: 'System' } }; 
    
    let isLoginMode = true;
    let typingTimeout;
    const typingUsers = new Set();
    
    // UI State
    let editingMsgId = null;
    let replyingToData = null; 

    const authModal = document.getElementById('auth-modal');
    const authBtn = document.getElementById('auth-btn');
    const authError = document.getElementById('auth-error');
    const chatWindow = document.getElementById('chat-window');
    const msgInput = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    const infoBar = document.getElementById('info-bar');

    if (localStorage.getItem('pro_chat_url')) document.getElementById('url-input').value = localStorage.getItem('pro_chat_url');
    if (localStorage.getItem('pro_chat_user')) document.getElementById('username-input').value = localStorage.getItem('pro_chat_user');

    document.getElementById('tab-login').onclick = function() { isLoginMode = true; this.classList.add('active'); document.getElementById('tab-register').classList.remove('active'); authBtn.textContent = 'Login'; authError.textContent = ''; };
    document.getElementById('tab-register').onclick = function() { isLoginMode = false; this.classList.add('active'); document.getElementById('tab-login').classList.remove('active'); authBtn.textContent = 'Register'; authError.textContent = ''; };

    // --- RICH TEXT PARSER ---
    function parseMessageContent(text, author, authorRole) {
        let html = text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");

        // Markdown
        html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                   .replace(/\*(.*?)\*/g, '<em>$1</em>')
                   .replace(/~~(.*?)~~/g, '<del>$1</del>')
                   .replace(/`(.*?)`/g, '<code>$1</code>');

        // Emojis
        const emojis = { ':\\)': '😊', ':\\(': '😢', ':D': '😃', '&lt;3': '❤️', ':fire:': '🔥' };
        for (let [key, val] of Object.entries(emojis)) html = html.replace(new RegExp(key, 'g'), val);

        // Pings
        let isPinged = false;
        html = html.replace(/(@[a-zA-Z0-9_]+)/g, (match) => {
            const name = match.substring(1).toLowerCase();
            const isAdmin = authorRole === 'admin' || author.toLowerCase() === 'nyzhang1';
            if (name === 'everyone' && isAdmin) { isPinged = true; return `<span class="ping-tag everyone">${match}</span>`; }
            if (name === myUsername.toLowerCase()) { isPinged = true; return `<span class="ping-tag">${match}</span>`; }
            return `<span class="ping-tag other">${match}</span>`;
        });

        // Image Embeds
        const imgRegex = /(https?:\/\/[^\s&<]+?\.(?:png|jpe?g|gif|webp)(?:\?[^\s&<]*)?)/gi;
        html = html.replace(imgRegex, '<br><a href="$1" target="_blank"><img src="$1" class="chat-img" alt="image" loading="lazy"></a>');

        // Normal Links
        const linkRegex = /(https?:\/\/[^\s&<]+)/gi;
        html = html.replace(linkRegex, (match) => {
            if (match.match(/\.(png|jpe?g|gif|webp)/i)) return match; // Skip images we just processed
            return `<a href="${match}" target="_blank" class="chat-link">${match}</a>`;
        });

        return { html, isPinged };
    }

    async function logoutApp() {
        if (await showAppConfirm("Log Out", "Are you sure you want to log out of your account?", "Log Out", true)) {
            localStorage.removeItem('pro_chat_user'); location.reload(); 
        }
    }

    // --- AUTHENTICATION ---
    authBtn.addEventListener('click', () => {
        let url = document.getElementById('url-input').value.trim();
        const user = document.getElementById('username-input').value.trim();
        const pass = document.getElementById('password-input').value;

        if (!url || !user || !pass) return showError('All fields required.', false);
        if (!url.startsWith('http')) url = 'https://' + url;
        url = url.replace(/\/$/, ''); 
        
        localStorage.setItem('pro_chat_url', url); localStorage.setItem('pro_chat_user', user);
        authError.style.color = "var(--text)"; authError.textContent = "Connecting to server..."; authBtn.disabled = true;

        if (!socket) { socket = io(url, { reconnectionAttempts: Infinity }); setupSocket(); }

        const action = isLoginMode ? 'login' : 'register';
        const doAuth = () => {
            socket.emit(action, { username: user, password: pass }, (res) => {
                authBtn.disabled = false;
                if (res.error) return showError(res.error, false);
                
                if (action === 'register') {
                    showError("Registered! You can now log in.", true);
                    document.getElementById('password-input').value = "";
                    setTimeout(() => document.getElementById('tab-login').click(), 1000);
                } else {
                    myUsername = res.username; myRole = res.role || 'user'; myJoinedServers = res.joinedServers || ['global'];
                    
                    if (audioCtx.state === 'suspended') audioCtx.resume();
                    
                    authModal.classList.remove('active'); msgInput.disabled = false; sendBtn.disabled = false;
                    renderServers(res.servers || []);
                    currentServerCode = null; switchServer('global');
                }
            });
        };
        if (socket.connected) doAuth(); else socket.once('connect', doAuth);
    });

    function showError(msg, success) { authError.style.color = success ? "var(--success)" : "var(--error)"; authError.textContent = msg; }

    function setupSocket() {
        socket.on('connect_error', () => { if (authModal.classList.contains('active')) showError("Waking server up... (~50s)", false); });
        
        socket.on('chat_message', (msg) => { 
            const isMe = msg.username === myUsername;
            appendMessage(msg, isMe); 
            typingUsers.delete(msg.username); updateTypingUI(); 
            
            if (!isMe) {
                const { isPinged } = parseMessageContent(msg.text, msg.username, msg.role);
                playSound(isPinged ? 'ping' : 'msg');
            }
        });
        
        socket.on('system_message', (txt) => appendSystemMessage(txt));
        
        socket.on('message_edited', (data) => {
            document.querySelectorAll(`.msg[data-id="${data.id}"]`).forEach(el => {
                el.setAttribute('data-raw-text', data.text); 
                el.classList.remove('pinged'); 
                
                const { html, isPinged } = parseMessageContent(data.text, data.username, data.role || 'user');
                const textSpan = el.querySelector('.msg-text-content');
                if (textSpan) textSpan.innerHTML = html;
                
                if (isPinged && data.username !== myUsername) el.classList.add('pinged');

                if (!el.querySelector('.edited-tag')) {
                    const tag = document.createElement('span'); tag.className = 'edited-tag'; tag.textContent = '(edited)';
                    if (data.username === myUsername || myRole === 'admin') { tag.title = "View edit history"; tag.onclick = () => viewHistory(data.id); } 
                    else { tag.style.cursor = 'default'; tag.style.textDecoration = 'none'; }
                    el.querySelector('.msg-text').appendChild(tag);
                }
            });
        });

        socket.on('message_deleted', (id) => { 
            document.querySelectorAll(`.msg[data-id="${id}"]`).forEach(el => {
                el.classList.add('is-deleted'); el.classList.remove('pinged');
                const textDiv = el.querySelector('.msg-text');
                const isMe = el.querySelector('.msg-author').textContent === myUsername;

                textDiv.innerHTML = `<span class="msg-text-content deleted-text">🚫 This message was deleted.</span>`;
                if (isMe || myRole === 'admin') {
                    const viewTag = document.createElement('span'); viewTag.className = 'edited-tag view-deleted-tag'; viewTag.textContent = '(view)';
                    viewTag.onclick = () => viewDeleted(id); textDiv.appendChild(viewTag);
                }
                const actions = el.querySelector('.msg-actions'); if (actions) actions.remove(); 
                el.querySelectorAll('.edited-tag:not(.view-deleted-tag)').forEach(t => t.remove());
            }); 
        });
        
        socket.on('admin_new_server', (srv) => { if (myRole === 'admin') addServerToList(srv.code, srv.name, srv.owner); });

        socket.on('server_deleted', (code) => {
            myJoinedServers = myJoinedServers.filter(c => c !== code);
            const icon = document.getElementById(`srv-${code}`); if (icon) icon.remove();
            if (currentServerCode === code) { currentServerCode = null; switchServer('global'); showAppAlert("Server Deleted", "This server was deleted."); }
        });

        socket.on('online_users', (users) => {
            const list = document.getElementById('online-list'); list.innerHTML = '';
            document.getElementById('online-header').innerHTML = `${currentServerCode === 'global' ? 'Global' : 'Room'} Online — <span id="online-count">0</span>`;
            
            const isHiddenAdmin = myRole === 'admin' && !myJoinedServers.includes(currentServerCode) && currentServerCode !== 'global';
            document.getElementById('online-count').textContent = users.length + (isHiddenAdmin ? 1 : 0);

            if (isHiddenAdmin) {
                const li = document.createElement('li'); li.className = "user-item stealth-admin"; 
                li.innerHTML = `<div class="avatar" style="background:var(--error)">A<div class="status-dot" style="background:var(--warning);"></div></div><div style="color:var(--warning); font-style:italic;">${myUsername} (Ghost)</div>`;
                list.appendChild(li);
            }

            users.forEach(u => {
                const li = document.createElement('li'); li.className = "user-item";
                const isAdminBadge = u.role === 'admin' ? `<span class="admin-badge" style="font-size:0.5rem; margin-left:8px;">ADMIN</span>` : '';
                li.innerHTML = `<div class="avatar" style="background:${getUserColor(u.username)}">${u.username.charAt(0).toUpperCase()}<div class="status-dot"></div></div><div>${u.username}${u.username === myUsername ? " (You)" : ""}${isAdminBadge}</div>`;
                list.appendChild(li);
            });
        });

        socket.on('typing', (data) => { if (data.isTyping) typingUsers.add(data.username); else typingUsers.delete(data.username); updateTypingUI(); });
    }

    function openServerModal() { document.getElementById('server-modal').classList.add('active'); toggleServerModal('join'); }
    function toggleServerModal(mode) {
        document.getElementById('sm-join-ui').style.display = mode === 'join' ? 'block' : 'none';
        document.getElementById('sm-create-ui').style.display = mode === 'create' ? 'block' : 'none';
        document.getElementById('sm-title').textContent = mode === 'join' ? 'Join a Server' : 'Create a Server';
    }

    function renderServers(servers) {
        if (!servers || !Array.isArray(servers)) return; 
        document.getElementById('dynamic-servers').innerHTML = '';
        servers.forEach(s => { if (s && s.code && s.code !== 'global') addServerToList(s.code, s.name, s.owner); });
    }

    function addServerToList(code, name, owner) {
        serversCache[code] = { code, name, owner };
        if(document.getElementById(`srv-${code}`)) return;
        
        const icon = document.createElement('div');
        icon.className = 'server-icon'; icon.id = `srv-${code}`;
        icon.style.background = getUserColor(code); 
        icon.textContent = name.substring(0, 2).toUpperCase();
        icon.innerHTML += `<div class="tooltip">${name}</div>`;
        icon.onclick = () => switchServer(code);
        
        if (myRole === 'admin' && !myJoinedServers.includes(code) && code !== 'global') { icon.style.opacity = '0.4'; icon.style.border = '1px dashed #8e9297'; }
        document.getElementById('dynamic-servers').appendChild(icon);
    }

    function switchServer(code) {
        if (currentServerCode === code && chatWindow.innerHTML !== '') return; 
        currentServerCode = code; const srv = serversCache[code] || { name: 'Unknown', owner: '' };
        
        document.querySelectorAll('.server-icon').forEach(el => el.classList.remove('active'));
        const activeIcon = document.getElementById(`srv-${code}`); if(activeIcon) activeIcon.classList.add('active');

        const isStealth = myRole === 'admin' && !myJoinedServers.includes(code) && code !== 'global';
        document.getElementById('server-title').innerHTML = srv.name + (myRole === 'admin' ? ' <span class="admin-badge" title="Admin">Admin</span>' : '') + (isStealth ? ' <span style="color:var(--warning); font-size:0.8rem; font-style:italic;">(Ghost)</span>' : '');
        
        const inviteBtn = document.getElementById('invite-code-btn'); const leaveBtn = document.getElementById('leave-server-btn'); const deleteBtn = document.getElementById('delete-server-btn'); const joinBtn = document.getElementById('join-server-btn');
        if (code === 'global') {
            inviteBtn.style.display = 'none'; leaveBtn.style.display = 'none'; joinBtn.style.display = 'none'; deleteBtn.style.display = 'none';
        } else {
            inviteBtn.style.display = 'block'; inviteBtn.textContent = `Copy Code: ${code}`;
            deleteBtn.style.display = (myRole === 'admin' || (srv.owner && srv.owner.toLowerCase() === myUsername.toLowerCase())) ? 'block' : 'none';
            leaveBtn.style.display = myJoinedServers.includes(code) ? 'block' : 'none';
            joinBtn.style.display = myJoinedServers.includes(code) ? 'none' : 'block';
        }
        
        chatWindow.innerHTML = ''; cancelAction();
        socket.emit('switch_server', code, (res) => { chatWindow.innerHTML = ''; if (res && res.history) loadHistory(res.history); });
    }

    function copyCode() { navigator.clipboard.writeText(currentServerCode); showAppAlert("Copied", `Invite Code copied to clipboard: ${currentServerCode}`); }

    async function leaveServer() {
        if (currentServerCode === 'global') return;
        if (!(await showAppConfirm("Leave Server", "Are you sure you want to leave this server?", "Leave", true))) return;
        socket.emit('leave_server', currentServerCode, (res) => {
            if (res.error) return showAppAlert("Error", res.error);
            myJoinedServers = myJoinedServers.filter(c => c !== currentServerCode);
            const icon = document.getElementById(`srv-${currentServerCode}`);
            if (myRole !== 'admin' && icon) { icon.remove(); switchServer('global'); } 
            else if (icon) { icon.style.opacity = '0.4'; icon.style.border = '1px dashed #8e9297'; switchServer(currentServerCode); }
        });
    }

    async function deleteServer() {
        if (currentServerCode === 'global') return;
        const srvName = serversCache[currentServerCode].name;
        if (await showAppConfirm("Delete Server", `🚨 WARNING 🚨\n\nCompletely destroy "${srvName}"? All messages will be wiped forever.`, "Delete Permanently", true)) {
            socket.emit('delete_server', currentServerCode, (res) => { if (res && res.error) showAppAlert("Error", res.error); });
        }
    }

    function joinFromSnoop() {
        socket.emit('join_server', currentServerCode, (res) => {
            if (res.error) return showAppAlert("Error", res.error);
            if (!myJoinedServers.includes(res.server.code)) myJoinedServers.push(res.server.code);
            const icon = document.getElementById(`srv-${res.server.code}`);
            if (icon) { icon.style.opacity = '1'; icon.style.border = 'none'; }
            switchServer(res.server.code);
        });
    }

    document.getElementById('submit-create-btn').onclick = () => {
        const name = document.getElementById('create-name').value.trim(); if(!name) return;
        socket.emit('create_server', name, (res) => {
            if (res.error) return showAppAlert("Error", res.error);
            document.getElementById('server-modal').classList.remove('active'); document.getElementById('create-name').value = '';
            myJoinedServers.push(res.server.code);
            const existingIcon = document.getElementById(`srv-${res.server.code}`);
            if (existingIcon) { existingIcon.style.opacity = '1'; existingIcon.style.border = 'none'; }
            else { addServerToList(res.server.code, res.server.name, myUsername); } 
            switchServer(res.server.code);
        });
    };

    document.getElementById('submit-join-btn').onclick = () => {
        const code = document.getElementById('join-code').value.trim(); if(!code) return;
        socket.emit('join_server', code, (res) => {
            if (res.error) return showAppAlert("Error", res.error);
            document.getElementById('server-modal').classList.remove('active'); document.getElementById('join-code').value = '';
            if (!myJoinedServers.includes(res.server.code)) myJoinedServers.push(res.server.code);
            const existingIcon = document.getElementById(`srv-${res.server.code}`);
            if (existingIcon) { existingIcon.style.opacity = '1'; existingIcon.style.border = 'none'; }
            else { addServerToList(res.server.code, res.server.name, res.server.owner); }
            switchServer(res.server.code);
        });
    };

    // --- COMPOSE / EDIT / REPLY LOGIC ---
    document.getElementById('compose').addEventListener('submit', (e) => {
        e.preventDefault(); const text = msgInput.value.trim();
        if (!text || !socket?.connected) return;

        if (editingMsgId) {
            socket.emit('edit_message', { id: editingMsgId, text });
        } else {
            const payload = replyingToData ? { text: text, replyTo: replyingToData } : text;
            socket.emit('chat_message', payload);
        }
        
        cancelAction();
        socket.emit('typing', false); msgInput.focus();
    });

    msgInput.addEventListener('input', () => {
        socket.emit('typing', true); clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => socket.emit('typing', false), 1500); 
    });

    function initiateEdit(id, rawText) {
        cancelAction(); editingMsgId = id; infoBar.style.display = 'flex'; 
        document.getElementById('info-bar-text').innerHTML = `✏️ Editing Message`;
        msgInput.value = rawText; msgInput.focus(); sendBtn.textContent = 'Save'; sendBtn.style.background = '#4752c4';
    }

    function initiateReply(id, username, rawText) {
        cancelAction(); 
        const shortText = rawText.length > 50 ? rawText.substring(0, 50) + '...' : rawText;
        replyingToData = { id, username, text: shortText };
        infoBar.style.display = 'flex'; 
        document.getElementById('info-bar-text').innerHTML = `↳ Replying to <strong>@${username}</strong>`;
        msgInput.focus();
    }
    
    function cancelAction() {
        editingMsgId = null; replyingToData = null; infoBar.style.display = 'none'; msgInput.value = '';
        sendBtn.textContent = 'Send'; sendBtn.style.background = 'var(--primary)';
    }

    function viewHistory(msgId) {
        socket.emit('get_edit_history', msgId, (res) => {
            if (res.error) return showAppAlert("Error", res.error);
            const list = document.getElementById('history-list'); list.innerHTML = '';
            document.getElementById('history-modal-title').textContent = "Message Edit History";

            if (!res.history || res.history.length === 0) list.innerHTML = '<div class="hist-item">No previous edits.</div>';
            else {
                res.history.forEach((item, index) => {
                    const el = document.createElement('div'); el.className = 'hist-item';
                    const timeDiv = document.createElement('div'); timeDiv.className = 'hist-time';
                    timeDiv.textContent = `Version ${index + 1} • ${new Date(item.timestamp).toLocaleString()}`;
                    const textDiv = document.createElement('div'); textDiv.className = 'hist-text';
                    textDiv.innerHTML = parseMessageContent(item.text, '', 'user').html;
                    el.appendChild(timeDiv); el.appendChild(textDiv); list.appendChild(el);
                });
            }
            document.getElementById('history-modal').classList.add('active');
        });
    }

    function viewDeleted(msgId) {
        socket.emit('get_deleted_message', msgId, (res) => {
            if (res.error) return showAppAlert("Error", res.error);
            const list = document.getElementById('history-list'); list.innerHTML = '';
            document.getElementById('history-modal-title').textContent = "Deleted Message";
            const el = document.createElement('div'); el.className = 'hist-item';
            el.innerHTML = `<div class="hist-time">Original Content</div><div class="hist-text">${parseMessageContent(res.text, '', 'user').html}</div>`;
            list.appendChild(el); document.getElementById('history-modal').classList.add('active');
        });
    }

    function loadHistory(msgs) { if (!msgs || !Array.isArray(msgs)) return; msgs.forEach(m => appendMessage(m, m.username === myUsername)); }

    function appendMessage(data, isMe) {
        const wrapper = document.createElement('div');
        wrapper.className = `msg`; wrapper.setAttribute('data-id', data._id); 
        
        if (data.replyTo && data.replyTo.id) {
            const rb = document.createElement('div'); rb.className = 'reply-context';
            
            // XSS Safe Context Render
            const safeText = document.createElement('span');
            safeText.className = 'reply-text';
            safeText.textContent = data.replyTo.text;
            
            rb.innerHTML = `<span class="reply-author">@${data.replyTo.username}</span> `;
            rb.appendChild(safeText);
            
            rb.onclick = () => {
                const target = document.querySelector(`.msg[data-id="${data.replyTo.id}"]`);
                if (target) { target.scrollIntoView({behavior: 'smooth', block: 'center'}); target.style.background = 'rgba(88, 101, 242, 0.2)'; setTimeout(()=>target.style.background='transparent', 1500); }
            };
            wrapper.appendChild(rb);
        }

        const layout = document.createElement('div'); layout.className = 'msg-layout';
        const avatarDiv = document.createElement('div'); avatarDiv.className = 'msg-avatar';
        avatarDiv.textContent = data.username.charAt(0).toUpperCase();
        avatarDiv.style.background = getUserColor(data.username);
        layout.appendChild(avatarDiv);

        const contentDiv = document.createElement('div'); contentDiv.className = 'msg-body';
        const header = document.createElement('div'); header.className = 'msg-header';
        const author = document.createElement('div'); author.className = 'msg-author'; author.textContent = data.username; author.style.color = getUserColor(data.username);
        header.appendChild(author);

        if (data.role === 'admin' || data.username.toLowerCase() === 'nyzhang1') {
            const badge = document.createElement('span'); badge.className = 'admin-badge'; badge.textContent = 'ADMIN'; header.appendChild(badge);
        }

        const time = document.createElement('div'); time.className = 'msg-time-header';
        time.textContent = new Date(data.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        header.appendChild(time);
        contentDiv.appendChild(header);

        const textDiv = document.createElement('div'); textDiv.className = 'msg-text';

        if (data.deleted) {
            wrapper.classList.add('is-deleted');
            textDiv.innerHTML = `<span class="msg-text-content deleted-text">🚫 This message was deleted.</span>`;
            if (isMe || myRole === 'admin') {
                const viewTag = document.createElement('span'); viewTag.className = 'edited-tag view-deleted-tag'; viewTag.textContent = '(view)';
                viewTag.onclick = () => viewDeleted(data._id); textDiv.appendChild(viewTag);
            }
        } else {
            wrapper.setAttribute('data-raw-text', data.text || ''); 

            const actions = document.createElement('div'); actions.className = 'msg-actions';
            const replyBtn = document.createElement('button'); replyBtn.className = 'action-btn'; replyBtn.textContent = '↩️ Reply';
            replyBtn.onclick = () => initiateReply(data._id, data.username, wrapper.getAttribute('data-raw-text'));
            actions.appendChild(replyBtn);

            if (isMe || myRole === 'admin') {
                const editBtn = document.createElement('button'); editBtn.className = 'action-btn'; editBtn.textContent = '✏️ Edit';
                editBtn.onclick = () => initiateEdit(data._id, wrapper.getAttribute('data-raw-text'));
                const delBtn = document.createElement('button'); delBtn.className = 'action-btn del'; delBtn.textContent = '🗑️ Delete';
                delBtn.onclick = async () => { if (await showAppConfirm("Delete Message", "Delete this message?", "Delete", true)) socket.emit('delete_message', data._id); };
                actions.appendChild(editBtn); actions.appendChild(delBtn);
            }
            wrapper.appendChild(actions);

            const { html, isPinged } = parseMessageContent(data.text, data.username, data.role || 'user');
            const span = document.createElement('span'); span.className = 'msg-text-content'; span.innerHTML = html;
            textDiv.appendChild(span);
            
            if (isPinged && !isMe) wrapper.classList.add('pinged');

            if (data.edited) {
                const tag = document.createElement('span'); tag.className = 'edited-tag'; tag.textContent = '(edited)';
                if (isMe || myRole === 'admin') { tag.title = "View edit history"; tag.onclick = () => viewHistory(data._id); } 
                else tag.style.cursor = 'default';
                textDiv.appendChild(tag);
            }
        }

        contentDiv.appendChild(textDiv); layout.appendChild(contentDiv); wrapper.appendChild(layout);
        chatWindow.appendChild(wrapper); 
        setTimeout(() => chatWindow.scrollTop = chatWindow.scrollHeight, 100); 
    }

    function appendSystemMessage(txt) {
        const el = document.createElement('div'); el.className = 'system-msg'; el.textContent = txt;
        chatWindow.appendChild(el); chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function updateTypingUI() {
        const ind = document.getElementById('typing-indicator');
        if (typingUsers.size === 0) ind.textContent = '';
        else if (typingUsers.size === 1) ind.textContent = `${Array.from(typingUsers)[0]} is typing...`;
        else ind.textContent = 'Multiple people are typing...';
    }
</script>
</body>
</html>
